mode: rule
external-controller: 127.0.0.1:9090
external-ui: ./metacubexd
allow-lan: false
log-level: silent
ipv6: true
disable-keep-alive: true
unified-delay: true
tcp-concurrent: true
geodata-loader: memconservative


dns:
  enable: true
  cache-algorithm: lru
  prefer-h3: false
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - geosite:cn
    - geosite:geolocation-cn
    - geosite:private
  use-hosts: false
  use-system-hosts: true
  default-nameserver:
    - tls://1.12.12.12:853
    - tls://223.5.5.5:853
  nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query

rules:
  - IP-CIDR,0.0.0.0/32,REJECT,no-resolve
  - DOMAIN-REGEX,^ad\..*,REJECT
  - DOMAIN-REGEX,.*\.ad\..*,REJECT
  - GEOSITE,category-ads-all,REJECT

  - DOMAIN-KEYWORD,teracloud,вҡЎиҮӘеҠЁйҖүжӢ©вҡЎ

  - GEOSITE,cn,DIRECT
  - GEOSITE,geolocation-cn,DIRECT
  - GEOSITE,private,DIRECT
  - GEOIP,cn,DIRECT,no-resolve
  - GEOIP,private,DIRECT,no-resolve

  - GEOSITE,CATEGORY-AI-!CN,рҹ§ дәәе·ҘжҷәиғҪрҹ§ 

  - DOMAIN-SUFFIX,jp,рҹҮҜрҹҮөж—Ҙжң¬зҪ‘з«ҷрҹҮҜрҹҮө
  - GEOSITE,DLSITE,рҹҮҜрҹҮөж—Ҙжң¬зҪ‘з«ҷрҹҮҜрҹҮө
  - GEOSITE,DMM,рҹҮҜрҹҮөж—Ҙжң¬зҪ‘з«ҷрҹҮҜрҹҮө
  - DOMAIN,rss.4evergr8.workers.dev,рҹҮҜрҹҮөж—Ҙжң¬зҪ‘з«ҷрҹҮҜрҹҮө

  - GEOSITE,category-cryptocurrency,рҹӘҷеҠ еҜҶиҙ§еёҒрҹӘҷ

  - GEOSITE,youtube,рҹҢҚеӣҪеӨ–еӘ’дҪ“рҹҢҚ

  - MATCH,вҡЎиҮӘеҠЁйҖүжӢ©вҡЎ


